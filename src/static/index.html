<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <section id="advisor-auth-container">
      <h3>Advisor Login</h3>
      <form id="advisor-login-form">
        <div class="form-group">
          <label for="advisor-username">Advisor Username:</label>
          <input type="text" id="advisor-username" required placeholder="advisor1" />
        </div>
        <div class="form-group">
          <label for="advisor-password">Password:</label>
          <input type="password" id="advisor-password" required placeholder="Enter advisor password" />
        </div>
        <div class="advisor-actions">
          <button type="submit">Log In</button>
          <button type="button" id="advisor-logout-btn" class="hidden">Log Out</button>
        </div>
      </form>
      <div id="advisor-status" class="info">Not logged in as advisor</div>
    </section>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
